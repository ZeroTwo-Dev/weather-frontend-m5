<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Región</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-info" href="index.html">
            <i class="bi bi-wind"></i> Clima de Teyvat
        </a>
        
        <div class="nation-icons-container d-none d-lg-flex">
            <i class="bi bi-wind" title="Anemo - Mondstadt"></i>
            <i class="bi bi-geo-alt" title="Geo - Liyue"></i>
            <i class="bi bi-cloud-lightning" title="Electro - Inazuma"></i>
            <i class="bi bi-tree" title="Dendro - Sumeru"></i>
            <i class="bi bi-droplet" title="Hydro - Fontaine"></i>
            <i class="bi bi-fire" title="Pyro - Natlan"></i>
            <i class="bi bi-snow" title="Cryo - Snezhnaya"></i>
        </div>

        <div class="navbar-nav ms-auto">
            <a class="nav-link active border border-info rounded px-3" href="index.html">Regresar</a>
        </div>
    </div>
</nav>
    </header>

    <main class="container my-5 flex-grow-1">
        <div id="detalle-contenido" class="row g-4 justify-content-center align-items-start">
        </div>
    </main>

    <section class="container my-5">
        <div class="card shadow">
            <div class="card-body">
                <h2 id="nombre-region" class="card-title text-center mb-4">Cargando región...</h2>

                <div id="seccion-alerta" class="alert alert-info text-center d-none">
                    <span id="alerta-texto"></span>
                </div>

                <div class="row text-center mt-4">
                    <div class="col-4">
                        <h5>Promedio</h5>
                        <p id="temp-promedio" class="h2 text-primary">--</p>
                    </div>
                    <div class="col-4">
                        <h5>Máxima</h5>
                        <p id="temp-maxima" class="h2 text-danger">--</p>
                    </div>
                    <div class="col-4">
                        <h5>Mínima</h5>
                        <p id="temp-minima" class="h2 text-info">--</p>
                    </div>
                </div>

                <div id="pronostico-semanal" class="mt-5">
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p>Cesar Ossa &copy; 2026</p>
    </footer>

    <script src="assets/js/WeatherApp.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
